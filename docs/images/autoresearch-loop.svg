<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">How the Hermes Autoresearch loop works</title>
  <desc id="desc">A trusted proposal command edits a target repository, the harness checks the path allowlist, an evaluator scores the trial, and accepted improvements are committed locally while rejected trials are reverted. Results are written to TSV and JSONL logs.</desc>

  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="24" fill="#f8fafc"/>
  <rect x="1" y="1" width="1198" height="718" rx="23" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="0" y="0" width="1200" height="112" rx="24" fill="url(#header)"/>
  <path d="M0 88 H1200 V112 H0 Z" fill="url(#header)"/>
  <text x="56" y="52" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="700">How the autoresearch loop works</text>
  <text x="56" y="82" fill="#ccfbf1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="17">Propose → inspect → evaluate → keep or revert → repeat</text>
  <rect x="921" y="34" width="224" height="44" rx="22" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.35"/>
  <text x="1033" y="62" text-anchor="middle" fill="#ffffff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="15" font-weight="600">LOCAL GIT CONTROL</text>

  <!-- Main loop cards -->
  <g filter="url(#shadow)">
    <rect x="54" y="166" width="236" height="142" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="332" y="166" width="236" height="142" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="610" y="166" width="236" height="142" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="888" y="166" width="258" height="142" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <circle cx="86" cy="198" r="18" fill="#0f766e"/>
    <text x="86" y="204" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">1</text>
    <text x="115" y="204" fill="#0f172a" font-size="19" font-weight="700">Propose</text>
    <text x="78" y="239" fill="#475569" font-size="15">
      <tspan x="78" dy="0">A trusted command edits</tspan>
      <tspan x="78" dy="22">the target repository.</tspan>
    </text>
    <rect x="78" y="274" width="152" height="21" rx="6" fill="#ecfeff"/>
    <text x="154" y="289" text-anchor="middle" fill="#155e75" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">proposal_command</text>

    <circle cx="364" cy="198" r="18" fill="#0f766e"/>
    <text x="364" y="204" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">2</text>
    <text x="393" y="204" fill="#0f172a" font-size="19" font-weight="700">Inspect</text>
    <text x="356" y="239" fill="#475569" font-size="15">
      <tspan x="356" dy="0">Git reports every changed</tspan>
      <tspan x="356" dy="22">path after the proposal.</tspan>
    </text>
    <rect x="356" y="274" width="159" height="21" rx="6" fill="#ecfeff"/>
    <text x="435.5" y="289" text-anchor="middle" fill="#155e75" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">path allowlist check</text>

    <circle cx="642" cy="198" r="18" fill="#0f766e"/>
    <text x="642" y="204" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">3</text>
    <text x="671" y="204" fill="#0f172a" font-size="19" font-weight="700">Evaluate</text>
    <text x="634" y="239" fill="#475569" font-size="15">
      <tspan x="634" dy="0">A frozen evaluator returns</tspan>
      <tspan x="634" dy="22">a score and acceptance.</tspan>
    </text>
    <rect x="634" y="274" width="164" height="21" rx="6" fill="#ecfeff"/>
    <text x="716" y="289" text-anchor="middle" fill="#155e75" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">evaluator_command</text>

    <circle cx="920" cy="198" r="18" fill="#0f766e"/>
    <text x="920" y="204" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">4</text>
    <text x="949" y="204" fill="#0f172a" font-size="19" font-weight="700">Decide</text>
    <text x="912" y="239" fill="#475569" font-size="15">
      <tspan x="912" dy="0">Accepted and improved?</tspan>
      <tspan x="912" dy="22">Keep it. Otherwise revert.</tspan>
    </text>
    <rect x="912" y="274" width="185" height="21" rx="6" fill="#ecfeff"/>
    <text x="1004.5" y="289" text-anchor="middle" fill="#155e75" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11">keep / revert controls</text>
  </g>

  <!-- Main arrows -->
  <g fill="none" stroke="#475569" stroke-width="3" marker-end="url(#arrow)">
    <path d="M290 237 H323"/>
    <path d="M568 237 H601"/>
    <path d="M846 237 H879"/>
  </g>

  <!-- Outcomes -->
  <g filter="url(#shadow)">
    <rect x="176" y="385" width="358" height="136" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <rect x="666" y="385" width="358" height="136" rx="18" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  </g>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <circle cx="216" cy="425" r="20" fill="#15803d"/>
    <path d="M207 425 l7 7 13 -15" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="250" y="421" fill="#14532d" font-size="21" font-weight="700">KEEP</text>
    <text x="250" y="448" fill="#166534" font-size="15">Stage all accepted changes and commit locally.</text>
    <rect x="208" y="475" width="284" height="27" rx="7" fill="#dcfce7"/>
    <text x="350" y="493" text-anchor="middle" fill="#14532d" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">autoresearch: accept trial N score=X</text>

    <circle cx="706" cy="425" r="20" fill="#b91c1c"/>
    <path d="M698 417 l16 16 M714 417 l-16 16" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <text x="740" y="421" fill="#7f1d1d" font-size="21" font-weight="700">REVERT</text>
    <text x="740" y="448" fill="#991b1b" font-size="15">Reset tracked changes and clean trial artifacts.</text>
    <rect x="698" y="475" width="284" height="27" rx="7" fill="#fee2e2"/>
    <text x="840" y="493" text-anchor="middle" fill="#7f1d1d" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12">git reset --hard &lt;before&gt;</text>
  </g>

  <path d="M965 308 C965 342 355 342 355 376" fill="none" stroke="#15803d" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="642" y="337" text-anchor="middle" fill="#15803d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700">YES — ACCEPTED + IMPROVED</text>
  <path d="M1015 308 C1015 344 845 344 845 376" fill="none" stroke="#b91c1c" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="948" y="367" text-anchor="middle" fill="#b91c1c" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700">NO</text>

  <!-- Loop and logs -->
  <path d="M355 521 V548 H118 C91 548 76 527 76 501 V341 C76 324 88 316 105 316 H170" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <path d="M845 521 V548 H355" fill="none" stroke="#475569" stroke-width="2.5" stroke-dasharray="7 6"/>
  <text x="93" y="426" transform="rotate(-90 93 426)" text-anchor="middle" fill="#475569" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="600">NEXT TRIAL</text>

  <rect x="54" y="575" width="1092" height="92" rx="16" fill="#0f172a"/>
  <text x="82" y="610" fill="#e2e8f0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="700">Every trial is recorded</text>
  <text x="82" y="638" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14">Decision, score, elapsed time, reason, and changed paths</text>
  <rect x="700" y="596" width="184" height="40" rx="9" fill="#1e293b" stroke="#334155"/>
  <text x="792" y="622" text-anchor="middle" fill="#67e8f9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">experiments.tsv</text>
  <rect x="902" y="596" width="214" height="40" rx="9" fill="#1e293b" stroke="#334155"/>
  <text x="1009" y="622" text-anchor="middle" fill="#67e8f9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13">experiments.jsonl</text>

  <text x="600" y="700" text-anchor="middle" fill="#64748b" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13">The harness creates no branch and performs no push — you stay in control of publication.</text>
</svg>
